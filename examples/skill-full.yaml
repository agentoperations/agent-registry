#
# All fields conform to the JSON schemas in ../schemas/.

kind: skill
apiVersion: v1alpha1

identity:
  name: incident-response
  version: 2.1.0
  title: Incident Response Playbook
  description: >-
    Structured incident response procedures for production systems.
    Covers detection, triage, containment, remediation, and post-mortem.
    Integrates with alerting and monitoring tools via MCP servers.

content:
  entrypoint: SKILL.md
  scripts:
    - scripts/classify_severity.py
    - scripts/gather_diagnostics.sh
    - scripts/generate_postmortem.py
  references:
    - https://sre.google/sre-book/managing-incidents/
    - https://response.pagerduty.com/
  assets:
    - assets/postmortem-template.md
    - assets/runbook-template.md
  triggerPhrases:
    - incident response
    - production outage
    - page received
    - severity classification
    - post-mortem

bom:
  dependencies:
    - name: k8s-troubleshooting
      version: ">=1.0.0"
  toolRequirements:
    - type: mcp-server
      name: alertmanager-mcp
      version: ">=1.0.0"
      required: true
    - type: mcp-server
      name: prometheus-mcp
      version: ">=2.0.0"
      required: true
  modelRequirements:
    - provider: any
      name: any
      role: primary

metadata:
  labels:
    team: sre
    domain: incident-management
  tags:
    - incident-response
    - sre
    - on-call
    - runbooks
    - post-mortem
  category: operations/incident-management
  authors:
