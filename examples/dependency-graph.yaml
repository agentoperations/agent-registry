# Agent Registry Spec — Dependency Graph
#
# Demonstrates how an agent's Bill of Materials (BOM) creates a dependency
# tree. This document shows the resolved dependency graph for the
# "cluster-doctor" agent, illustrating:
#
#   - Agent depends on 2 skills and 3 MCP servers
#   - Skills can depend on other skills (deduplication applies)
#   - Skills declare tool requirements (MCP servers they need)
#   - The resolver flattens and deduplicates the tree
#
# Dependency tree (visual):
#
#   cluster-doctor v1.0.0  (agent)
#   |-- k8s-troubleshooting v1.0.0  (skill)
#   |   +-- [tool requirement] kubernetes-mcp v1.0.0
#   |-- incident-response v2.1.0  (skill)
#   |   |-- [dependency] k8s-troubleshooting v1.0.0  (deduped -- already resolved above)
#   |   |-- [tool requirement] alertmanager-mcp v1.0.0
#   |   +-- [tool requirement] prometheus-mcp v2.0.0
#   |-- kubernetes-mcp v1.0.0  (mcp-server, direct)
#   |-- prometheus-mcp v2.0.0  (mcp-server, direct)
#   +-- alertmanager-mcp v1.0.0  (mcp-server, direct)
#
# After deduplication, the flat set of resolved artifacts is:
#   - 1 agent
#   - 2 skills (k8s-troubleshooting, incident-response)
#   - 3 MCP servers (kubernetes-mcp, prometheus-mcp, alertmanager-mcp)

kind: agent
apiVersion: v1alpha1

identity:
  name: cluster-doctor
  version: 1.0.0
  title: Cluster Doctor
  description: >-
    AI-powered Kubernetes cluster diagnostics agent.

artifacts:
  - registry: ghcr.io
    repository: example-org/cluster-doctor
    tag: "1.0.0"
    digest: sha256:b5bb9d8014a0f9b1d61e21e796d78dccdf1352f23cd32812f4850b878ae4944c

bom:
  # --- Skills ---
  skills:
    - name: k8s-troubleshooting
      version: "1.0.0"
      # This skill's own BOM declares:
      #   toolRequirements:
      #     - kubernetes-mcp >=1.0.0

    - name: incident-response
      version: "2.1.0"
      # This skill's own BOM declares:
      #   dependencies:
      #     - skill: k8s-troubleshooting >=1.0.0  (deduped at resolution time)
      #   toolRequirements:
      #     - alertmanager-mcp >=1.0.0
      #     - prometheus-mcp >=2.0.0

  # --- MCP Servers (direct tool references) ---
  # These are the agent's direct tool declarations. The resolver verifies
  # that skill toolRequirements are satisfied by these (or adds them).
  tools:
    - type: mcp-server
      name: kubernetes-mcp
      version: "1.0.0"
      required: true
      source: ghcr.io/example-org/kubernetes-mcp
      # Satisfies: k8s-troubleshooting toolRequirement for kubernetes-mcp >=1.0.0

    - type: mcp-server
      name: prometheus-mcp
      version: "2.0.0"
      required: true
      source: ghcr.io/example-org/prometheus-mcp
      # Satisfies: incident-response toolRequirement for prometheus-mcp >=2.0.0

    - type: mcp-server
      name: alertmanager-mcp
      version: "1.0.0"
      required: true
      source: ghcr.io/example-org/alertmanager-mcp
      # Satisfies: incident-response toolRequirement for alertmanager-mcp >=1.0.0

  # --- Models ---
  models:
    - role: primary
      name: granite-3.1-8b-instruct
      provider: ibm
      version: "3.1"

  # --- Orchestration ---
  orchestration:
    pattern: single-agent
    framework: llama-stack
    runtime: python-3.12

# --- Resolved dependency graph metadata ---
# This section is informational and may be generated by tooling.
# It captures the flattened, deduplicated resolution result.
