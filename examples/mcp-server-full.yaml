# Agent Registry Spec — Full MCP Server
#
# Demonstrates a fully-specified MCP server manifest for "prometheus-mcp".
# Includes all optional sections: transport, tools, resources, BOM
# (runtimeDependencies, externalServices), provenance, and trust signals.
#
# All fields conform to the JSON schemas in ../schemas/.

kind: mcp-server
apiVersion: v1alpha1

identity:
  name: prometheus-mcp
  version: 2.0.0
  title: Prometheus MCP Server
  description: >-
    MCP server for querying Prometheus metrics, alerts, and targets.
    Supports instant queries, range queries, label discovery, alert
    enumeration, and target health inspection.

metadata:
  labels:
    team: observability
    tier: production
  tags:
    - prometheus
    - metrics
    - monitoring
    - observability
  category: observability/metrics
  authors:
    - name: Observability Team
      email: observability@example.com
  license: Apache-2.0
  repository: https://github.com/example-org/prometheus-mcp

transport:
  type: streamable-http
  port: 8080
  url: https://prometheus-mcp.example.com/mcp

tools:
  - name: query-instant
    description: Execute an instant PromQL query and return the current value
    inputSchema:
      type: object
      properties:
        query:
          type: string
          description: "PromQL expression (e.g., up{job=\"apiserver\"})"
        time:
          type: string
          description: "Evaluation timestamp (RFC3339 or Unix). Defaults to now."
      required:
        - query

  - name: query-range
    description: Execute a range PromQL query over a time window
    inputSchema:
      type: object
      properties:
        query:
          type: string
          description: PromQL expression
        start:
          type: string
          description: Start timestamp (RFC3339 or Unix)
        end:
          type: string
          description: End timestamp (RFC3339 or Unix)
        step:
          type: string
          description: "Query resolution step (e.g., 15s, 1m, 5m)"
      required:
        - query
        - start
        - end

  - name: list-labels
    description: Return all known label names or values for a given label
    inputSchema:
      type: object
      properties:
        name:
          type: string
          description: Label name to list values for (omit for all label names)
        match:
          type: array
          description: Series selector filters
      required: []

  - name: get-alerts
    description: Return all currently firing and pending alerts
    inputSchema:
      type: object
      properties:
        state:
          type: string
          description: "Filter by alert state (firing, pending, inactive)"
      required: []

  - name: get-targets
    description: Return current scrape target status and health
    inputSchema:
      type: object
      properties:
        state:
          type: string
          description: "Filter by target state (active, dropped, any)"
      required: []

  - name: get-metric-metadata
    description: Return metadata about a metric (type, help, unit)
    inputSchema:
      type: object
      properties:
        metric:
          type: string
          description: Metric name
      required:
        - metric

resources:
  - uri: prometheus://config
    name: Prometheus Configuration
    description: Current Prometheus server configuration (scrape configs, rules, etc.)
    mimeType: application/yaml
  - uri: prometheus://rules
    name: Alerting and Recording Rules
    description: All loaded alerting and recording rules with evaluation status
    mimeType: application/json

artifacts:
  - registry: ghcr.io
    repository: example-org/prometheus-mcp
    tag: "2.0.0"
    digest: sha256:d7a8fbb307d7809469ca9abcb0082e4f8d5651e46d3cdb762d02d0bf37c9e592

bom:
  runtimeDependencies:
    - name: go
      version: ">=1.22.0"
      type: runtime
    - name: prometheus/client_golang
      version: "1.19.0"
      type: package
      source: go-modules
    - name: mark3labs/mcp-go
      version: "0.25.0"
      type: package
      source: go-modules
    - name: prometheus/common
      version: "0.52.0"
      type: package
      source: go-modules
  externalServices:
    - name: Prometheus API
      type: api
      required: true
      description: "Prometheus HTTP API v1 endpoint at ${PROMETHEUS_URL}/api/v1"

